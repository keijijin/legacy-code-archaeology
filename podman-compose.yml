version: '3.8'

# ローカル開発用 Podman Compose 設定
# 実行方法:
#   podman compose up -d
#   podman compose down
#   podman compose logs -f
#
# 注意: Docker ではなく Podman を使用すること（ADR-2026-004）

services:
  postgres:
    image: docker.io/library/postgres:16
    container_name: lca-postgres
    environment:
      POSTGRES_DB: lca_db
      POSTGRES_USER: lca_user
      POSTGRES_PASSWORD: lca_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lca_user -d lca_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  neo4j:
    image: docker.io/library/neo4j:5
    container_name: lca-neo4j
    environment:
      NEO4J_AUTH: neo4j/neo4j_password
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "neo4j_password", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  neo4j_data:
