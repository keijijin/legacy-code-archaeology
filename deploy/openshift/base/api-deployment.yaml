apiVersion: apps/v1
kind: Deployment
metadata:
  name: lca-api
  namespace: legacy-code-archaeology-dev
  labels:
    app: lca-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lca-api
  template:
    metadata:
      labels:
        app: lca-api
    spec:
      containers:
        - name: lca-api
          image: image-registry.openshift-image-registry.svc:5000/legacy-code-archaeology-dev/lca-api:latest
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: lca-config
            - secretRef:
                name: lca-secret
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 30
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
