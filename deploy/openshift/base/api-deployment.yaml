apiVersion: apps/v1
kind: Deployment
metadata:
  name: lca-api
  namespace: legacy-code-archaeology-dev
  labels:
    app: lca-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lca-api
  template:
    metadata:
      labels:
        app: lca-api
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: lca-api
          image: image-registry.openshift-image-registry.svc:5000/legacy-code-archaeology-dev/lca-api:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: lca-config
            - secretRef:
                name: lca-secret
          env:
            # Spring Boot が確実に参照する明示環境変数
            - name: SPRING_DATASOURCE_URL
              valueFrom:
                secretKeyRef:
                  name: lca-secret
                  key: DB_URL
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: lca-secret
                  key: DB_USERNAME
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: lca-secret
                  key: DB_PASSWORD
            - name: SPRING_NEO4J_URI
              valueFrom:
                secretKeyRef:
                  name: lca-secret
                  key: NEO4J_URI
            - name: SPRING_NEO4J_AUTHENTICATION_USERNAME
              valueFrom:
                secretKeyRef:
                  name: lca-secret
                  key: NEO4J_USERNAME
            - name: SPRING_NEO4J_AUTHENTICATION_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: lca-secret
                  key: NEO4J_PASSWORD
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsNonRoot: true
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 40
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 90
            periodSeconds: 30
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
