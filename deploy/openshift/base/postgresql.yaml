---
# PostgreSQL - OpenShift restricted SCC 準拠版
# quay.io/sclorg/postgresql は任意UID実行対応（OpenShift公式推奨系）
# fsGroup / runAsUser は明示しない（OpenShift が自動割当）
# 既存 PVC (lca-postgresql-pvc) を利用する
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lca-postgresql
  namespace: legacy-code-archaeology-dev
  labels:
    app: lca-postgresql
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lca-postgresql
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: lca-postgresql
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: postgresql
          image: quay.io/sclorg/postgresql-15-c9s:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5432
              name: postgresql
          env:
            - name: POSTGRESQL_DATABASE
              value: lca_db
            - name: POSTGRESQL_USER
              valueFrom:
                secretKeyRef:
                  name: lca-secret
                  key: DB_USERNAME
            - name: POSTGRESQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: lca-secret
                  key: DB_PASSWORD
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsNonRoot: true
          volumeMounts:
            - name: postgresql-data
              mountPath: /var/lib/pgsql/data
          readinessProbe:
            exec:
              command:
                - /usr/libexec/check-container
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            exec:
              command:
                - /usr/libexec/check-container
                - --live
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
        - name: postgresql-data
          persistentVolumeClaim:
            claimName: lca-postgresql-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: lca-postgresql
  namespace: legacy-code-archaeology-dev
  labels:
    app: lca-postgresql
spec:
  selector:
    app: lca-postgresql
  ports:
    - name: postgresql
      protocol: TCP
      port: 5432
      targetPort: 5432
