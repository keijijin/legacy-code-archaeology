# Secret テンプレート（実際の値はここに入れないこと）
# oc create secret generic lca-secret --from-literal=... で作成する
apiVersion: v1
kind: Secret
metadata:
  name: lca-secret
  namespace: legacy-code-archaeology-dev
type: Opaque
stringData:
  DB_URL: "jdbc:postgresql://lca-postgresql:5432/lca_db"
  DB_USERNAME: "lca_user"
  DB_PASSWORD: "<PASSWORD>"
  NEO4J_URI: "bolt://lca-neo4j:7687"
  NEO4J_USERNAME: "neo4j"
  NEO4J_PASSWORD: "neo4j_password"
  OPENAI_API_KEY: ""
