# Secret テンプレート（値は Git に入れないこと）
# 作成例:
# oc -n legacy-code-archaeology-dev create secret generic lca-secret \
#   --from-literal=DB_URL='jdbc:postgresql://lca-postgresql:5432/lca_db' \
#   --from-literal=DB_USERNAME='lca_user' \
#   --from-literal=DB_PASSWORD='changeme' \
#   --from-literal=NEO4J_URI='bolt://lca-neo4j:7687' \
#   --from-literal=NEO4J_USERNAME='neo4j' \
#   --from-literal=NEO4J_PASSWORD='neo4j_password' \
#   --from-literal=NEO4J_AUTH='neo4j/neo4j_password' \
#   --dry-run=client -o yaml | oc apply -f -
apiVersion: v1
kind: Secret
metadata:
  name: lca-secret
  namespace: legacy-code-archaeology-dev
type: Opaque
stringData:
  DB_URL: "jdbc:postgresql://lca-postgresql:5432/lca_db"
  DB_USERNAME: "lca_user"
  DB_PASSWORD: "<PASSWORD>"
  NEO4J_URI: "bolt://lca-neo4j:7687"
  NEO4J_USERNAME: "neo4j"
  NEO4J_PASSWORD: "<PASSWORD>"
  NEO4J_AUTH: "neo4j/<PASSWORD>"
  OPENAI_API_KEY: ""
