# Secret テンプレート（実際の値はここに入れないこと）
# oc create secret generic lca-secret --from-literal=... で作成する
apiVersion: v1
kind: Secret
metadata:
  name: lca-secret
  namespace: legacy-code-archaeology-dev
type: Opaque
stringData:
  DB_URL: "jdbc:postgresql://<HOST>:5432/lca_db"
  DB_USERNAME: "<USERNAME>"
  DB_PASSWORD: "<PASSWORD>"
  NEO4J_URI: "bolt://<HOST>:7687"
  NEO4J_USERNAME: "<USERNAME>"
  NEO4J_PASSWORD: "<PASSWORD>"
  OPENAI_API_KEY: ""
