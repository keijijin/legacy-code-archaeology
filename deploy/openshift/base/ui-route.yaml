apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: lca-ui-route
  namespace: legacy-code-archaeology-dev
  labels:
    app: lca-api
    tier: ui
  annotations:
    description: "Web UI entry route for portal/review/impact"
spec:
  to:
    kind: Service
    name: lca-api-service
    weight: 100
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
  wildcardPolicy: None
