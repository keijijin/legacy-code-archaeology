apiVersion: apps/v1
kind: Deployment
metadata:
  name: lca-postgres
  namespace: legacy-code-archaeology-dev
  labels:
    app: lca-postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lca-postgres
  template:
    metadata:
      labels:
        app: lca-postgres
    spec:
      securityContext:
        fsGroup: 26
      containers:
        - name: postgres
          image: docker.io/library/postgres:16
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: lca_db
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: lca-secret
                  key: DB_USERNAME
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: lca-secret
                  key: DB_PASSWORD
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "lca_user", "-d", "lca_db"]
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: lca-postgres-pvc
