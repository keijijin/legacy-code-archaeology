---
# Neo4j - OpenShift restricted SCC 準拠版
# 既存 PVC (lca-neo4j-pvc) を利用する。PVC 定義は別ファイル/既存リソースを使用。
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lca-neo4j
  namespace: legacy-code-archaeology-dev
  labels:
    app: lca-neo4j
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lca-neo4j
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: lca-neo4j
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: neo4j
          image: docker.io/library/neo4j:5-community
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 7474
              name: http
            - containerPort: 7687
              name: bolt
          env:
            - name: NEO4J_AUTH
              valueFrom:
                secretKeyRef:
                  name: lca-secret
                  key: NEO4J_AUTH
            - name: NEO4J_server_memory_heap_initial__size
              value: "256m"
            - name: NEO4J_server_memory_heap_max__size
              value: "512m"
            - name: NEO4J_server_directories_data
              value: /data
            - name: NEO4J_server_directories_logs
              value: /logs
            - name: NEO4J_server_directories_import
              value: /var/lib/neo4j/import
            - name: NEO4J_server_directories_plugins
              value: /var/lib/neo4j/plugins
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsNonRoot: true
          volumeMounts:
            - name: neo4j-data
              mountPath: /data
            - name: neo4j-logs
              mountPath: /logs
          readinessProbe:
            httpGet:
              path: /
              port: 7474
            initialDelaySeconds: 40
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /
              port: 7474
            initialDelaySeconds: 90
            periodSeconds: 30
            timeoutSeconds: 5
          resources:
            requests:
              memory: "512Mi"
              cpu: "200m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
      volumes:
        - name: neo4j-data
          persistentVolumeClaim:
            claimName: lca-neo4j-pvc
        - name: neo4j-logs
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: lca-neo4j
  namespace: legacy-code-archaeology-dev
  labels:
    app: lca-neo4j
spec:
  selector:
    app: lca-neo4j
  ports:
    - name: http
      port: 7474
      targetPort: 7474
    - name: bolt
      port: 7687
      targetPort: 7687
