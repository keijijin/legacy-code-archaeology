---
# Neo4j - OpenShift SCC準拠版
# neo4j/neo4j イメージは anyuid 相当が必要なため
# runAsNonRoot: true かつ OpenShift 自動割り当てを利用
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lca-neo4j
  namespace: legacy-code-archaeology-dev
  labels:
    app: lca-neo4j
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lca-neo4j
  template:
    metadata:
      labels:
        app: lca-neo4j
    spec:
      securityContext:
        runAsNonRoot: true
      containers:
        - name: neo4j
          image: docker.io/library/neo4j:5-community
          ports:
            - containerPort: 7474
              name: http
            - containerPort: 7687
              name: bolt
          env:
            - name: NEO4J_AUTH
              value: neo4j/neo4j_password
            - name: NEO4J_dbms_security_auth__minimum__password__length
              value: "8"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: neo4j-data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /
              port: 7474
            initialDelaySeconds: 30
            periodSeconds: 15
          resources:
            requests:
              memory: "512Mi"
              cpu: "200m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
      volumes:
        - name: neo4j-data
          persistentVolumeClaim:
            claimName: lca-neo4j-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: lca-neo4j-pvc
  namespace: legacy-code-archaeology-dev
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: Service
metadata:
  name: lca-neo4j
  namespace: legacy-code-archaeology-dev
spec:
  selector:
    app: lca-neo4j
  ports:
    - name: http
      port: 7474
      targetPort: 7474
    - name: bolt
      port: 7687
      targetPort: 7687
