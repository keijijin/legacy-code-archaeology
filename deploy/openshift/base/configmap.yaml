apiVersion: v1
kind: ConfigMap
metadata:
  name: lca-config
  namespace: legacy-code-archaeology-dev
data:
  SPRING_PROFILES_ACTIVE: "openshift"
  SERVER_PORT: "8080"
  LCA_LLM_EXTERNAL_SEND: "false"
  DB_URL: "jdbc:postgresql://lca-postgresql:5432/lca_db"
  DB_USERNAME: "lca_user"
  NEO4J_URI: "bolt://lca-neo4j:7687"
  NEO4J_USERNAME: "neo4j"
