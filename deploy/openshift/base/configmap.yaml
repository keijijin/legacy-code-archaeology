apiVersion: v1
kind: ConfigMap
metadata:
  name: lca-config
  namespace: legacy-code-archaeology-dev
data:
  SPRING_PROFILES_ACTIVE: "openshift"
  SERVER_PORT: "8080"
  LCA_LLM_EXTERNAL_SEND: "false"
  # Spring AI が API Key 未設定でも起動できるようダミーを許容
  SPRING_AI_OPENAI_API_KEY: "not-set"
  SPRING_AI_OPENAI_CHAT_OPTIONS_MODEL: "gpt-4o"
