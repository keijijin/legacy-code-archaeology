spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:${DB_URL}}
    username: ${SPRING_DATASOURCE_USERNAME:${DB_USERNAME}}
    password: ${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD}}

  neo4j:
    uri: ${SPRING_NEO4J_URI:${NEO4J_URI}}
    authentication:
      username: ${SPRING_NEO4J_AUTHENTICATION_USERNAME:${NEO4J_USERNAME}}
      password: ${SPRING_NEO4J_AUTHENTICATION_PASSWORD:${NEO4J_PASSWORD}}

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  ai:
    openai:
      api-key: ${SPRING_AI_OPENAI_API_KEY:not-set}
      chat:
        options:
          model: ${SPRING_AI_OPENAI_CHAT_OPTIONS_MODEL:gpt-4o}
          temperature: 0.2

lca:
  llm:
    external-send-enabled: ${LCA_LLM_EXTERNAL_SEND:false}
