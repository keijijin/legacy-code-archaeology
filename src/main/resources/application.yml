spring:
  application:
    name: legacy-code-archaeology

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/lca_db}
    username: ${DB_USERNAME:lca_user}
    password: ${DB_PASSWORD:lca_password}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  neo4j:
    uri: ${NEO4J_URI:bolt://localhost:7687}
    authentication:
      username: ${NEO4J_USERNAME:neo4j}
      password: ${NEO4J_PASSWORD:neo4j_password}

  flyway:
    enabled: true
    locations: classpath:db/migration

  ai:
    openai:
      api-key: ${OPENAI_API_KEY:}
      chat:
        options:
          model: gpt-4o
          temperature: 0.2

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    root: INFO
    com.legacy.archaeology: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} traceId=%X{traceId} projectId=%X{projectId} jobId=%X{jobId} - %msg%n"

lca:
  llm:
    external-send-enabled: ${LCA_LLM_EXTERNAL_SEND:false}
    prompt-version: "1.0.0"
  analysis:
    max-file-size-mb: 50
