<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>影響分析 | レガシーコード考古学</title>
  <style>
    :root {
      --bg: #0f172a; --card:#1e293b; --text:#e2e8f0; --muted:#94a3b8; --accent:#38bdf8; --border:#334155;
    }
    body { margin:0; font-family:ui-sans-serif,system-ui,sans-serif; background:linear-gradient(180deg,#0f172a,#111827); color:var(--text); }
    header, main { max-width:1100px; margin:0 auto; }
    header { padding:1.25rem 1.5rem; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; gap:1rem; flex-wrap:wrap; }
    main { padding:1.5rem; }
    a { color:var(--accent); text-decoration:none; margin-right:.8rem; }
    .row { display:flex; gap:.75rem; flex-wrap:wrap; margin-bottom:1rem; }
    input, select, button {
      background:#0b1220; color:var(--text); border:1px solid var(--border); border-radius:.5rem; padding:.65rem .8rem;
    }
    button { background:#0369a1; border-color:#0284c7; cursor:pointer; }
    .card { background:var(--card); border:1px solid var(--border); border-radius:.75rem; padding:1rem; margin-bottom:.75rem; }
    .muted { color:var(--muted); }
    pre { white-space:pre-wrap; background:#0b1220; border:1px solid var(--border); border-radius:.5rem; padding:.75rem; }
    #status { min-height:1.2rem; color:var(--accent); margin-bottom:1rem; }
  </style>
</head>
<body>
  <header>
    <div>
      <strong>影響分析コンソール</strong>
      <div class="muted">COLUMN / TABLE / ROUTE / PROGRAM / ENDPOINT</div>
    </div>
    <div>
      <a href="/">Portal</a>
      <a href="/review/">Review</a>
      <a href="/api/health" target="_blank">Health</a>
    </div>
  </header>
  <main>
    <div class="row">
      <input id="projectId" placeholder="Project ID" size="28" />
      <select id="targetType">
        <option>COLUMN</option>
        <option>TABLE</option>
        <option>ROUTE</option>
        <option>PROGRAM</option>
        <option>ENDPOINT</option>
        <option>API</option>
      </select>
      <input id="targetName" placeholder="targetName (例: customer_id)" size="28" />
      <input id="targetId" placeholder="targetId (任意)" size="20" />
      <button onclick="runImpact()">影響分析実行</button>
    </div>
    <div id="status"></div>
    <div id="summary" class="card muted">結果がここに表示されます。</div>
    <pre id="output">{}</pre>
  </main>
  <script>
    const params = new URLSearchParams(location.search);
    if (params.get('projectId')) document.getElementById('projectId').value = params.get('projectId');

    async function runImpact() {
      const projectId = document.getElementById('projectId').value.trim();
      const targetType = document.getElementById('targetType').value;
      const targetName = document.getElementById('targetName').value.trim();
      const targetId = document.getElementById('targetId').value.trim();
      const statusEl = document.getElementById('status');
      const summaryEl = document.getElementById('summary');
      const outputEl = document.getElementById('output');
      if (!projectId) { statusEl.textContent = 'Project ID を入力してください'; return; }
      if (!targetName && !targetId) { statusEl.textContent = 'targetName または targetId が必要です'; return; }
      statusEl.textContent = '実行中...';
      try {
        const res = await fetch(`/api/projects/${encodeURIComponent(projectId)}/impact`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            targetType,
            targetName: targetName || null,
            targetId: targetId || null,
            maxDepth: 3
          })
        });
        const body = await res.json();
        if (!res.ok) throw new Error(JSON.stringify(body));
        statusEl.textContent = `完了: impacted=${body.impactedCount ?? 0}`;
        summaryEl.innerHTML = `
          <div><strong>${body.targetType || ''} / ${body.targetName || body.targetId || ''}</strong></div>
          <div class="muted">impactedCount=${body.impactedCount ?? 0}, relatedTests=${(body.relatedTests||[]).length}</div>
        `;
        outputEl.textContent = JSON.stringify(body, null, 2);
      } catch (e) {
        statusEl.textContent = '失敗';
        summaryEl.textContent = String(e.message || e);
        outputEl.textContent = String(e.message || e);
      }
    }
  </script>
</body>
</html>
